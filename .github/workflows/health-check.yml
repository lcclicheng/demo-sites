name: Site health check

# 客户站点健康看板（P3 监控仪表盘 · 自建部分）：
# 每天定时对所有已部署站点做可用性检查（200 + 挂载点 + title）。
# 任一站点异常 → 自动创建 / 更新一个带 `health-alert` 标签的 GitHub Issue（即“看板”）；
# 全部恢复 → 自动关闭该 Issue。可随时在 Actions 手动触发。
# 与外部 UptimeRobot（分钟级探测 + 邮件/短信告警）互补，配置见 docs/monitoring.md。

on:
  schedule:
    - cron: '17 7 * * *'   # 每天 UTC 07:17（北京时间 15:17）跑一次；错峰非整点降低被限流概率
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

concurrency:
  group: health-check
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run health check
        id: check
        run: |
          set +e
          node health-check.mjs --json | tee health.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          # 把日志正文抓出来供 Issue 使用（截断到 6000 字符防超长）
          {
            echo 'report<<HEALTH_EOF'
            head -c 6000 health.log
            echo ''
            echo 'HEALTH_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Open / update alert issue on failure
        if: steps.check.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const report = process.env.REPORT || '(no report captured)';
            const title = '🩺 Site health alert: 有站点检查失败';
            const marker = '<!-- health-check-bot -->';
            const body = [
              marker,
              `**最近一次检查失败**（${new Date().toISOString()}）。`,
              '',
              '```',
              report,
              '```',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'health-alert', per_page: 20,
            });
            const hit = existing.data.find(i => (i.body || '').includes(marker));
            if (hit) {
              await github.rest.issues.update({ owner, repo, issue_number: hit.number, body });
              await github.rest.issues.createComment({ owner, repo, issue_number: hit.number, body: `再次检查仍失败（${new Date().toISOString()}）。详见上方最新报告。` });
            } else {
              await github.rest.issues.create({ owner, repo, title, body, labels: ['health-alert'] });
            }
        env:
          REPORT: ${{ steps.check.outputs.report }}

      - name: Close alert issue on recovery
        if: steps.check.outputs.exit_code == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- health-check-bot -->';
            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'health-alert', per_page: 20,
            });
            for (const i of existing.data) {
              if ((i.body || '').includes(marker)) {
                await github.rest.issues.createComment({ owner, repo, issue_number: i.number, body: `✅ 站点已全部恢复健康（${new Date().toISOString()}），自动关闭。` });
                await github.rest.issues.update({ owner, repo, issue_number: i.number, state: 'closed' });
              }
            }

      - name: Fail job if unhealthy
        if: steps.check.outputs.exit_code != '0'
        run: exit 1
