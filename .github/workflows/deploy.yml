name: Deploy demo sites to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      allow_orphans:
        description: '允许存在「具备 template+slug 但未纳入 PROJS」的孤儿站点（软阻断放行）。仅在确认无误时勾选。'
        type: boolean
        required: false
        default: false

# 仅用 GITHUB_TOKEN 发布 Pages，不依赖任何明文 PAT（权限最小化，见 docs/workflow.md 附录 B）
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署，避免并发覆盖
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 依赖缓存（v0.6）：缓存 npm 全局缓存目录(~/.npm)，缓存键取自根 package-lock.json。
      # generate.mjs 已改为「工程根一次性 npm ci + 各站点符号链接复用 node_modules」，
      # 故 10 站只真正安装 1 次，且命中本缓存，构建显著提速。
      # 注意：package-lock.json 必须提交进仓库，缓存键才稳定；改依赖版本即自动换键重装。
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      # 孤儿站点软阻断：默认缺失 PROJS 的新站会令 job 失败（fail-fast）；
      # 经 workflow_dispatch 勾选 allow_orphans 可临时放行（仅限确认无误时）。
      - name: Validate site configs (pre-deploy gate)
        run: node validate-sites.mjs ${{ github.event_name == 'workflow_dispatch' && inputs.allow_orphans == true && '--allow-orphans' || '' }}

      - name: Build all 10 demo sites
        run: bash build-clean.sh

      - name: Assemble public/ artifact
        run: |
          rm -rf public
          mkdir -p public
          # 门户页 + 禁用 Jekyll
          cp index.html public/ 2>/dev/null || true
          cp .nojekyll public/ 2>/dev/null || true
          # 客户自助 CMS 后台（Decap）：复制到 public/admin，线上 /demo-sites/admin/
          # 登录需在 GitHub 注册 OAuth App 并把 client_id 填进 admin/config.yml（见 docs/cms.md）
          cp -r admin public/admin 2>/dev/null || true
          # 每个构建产物 -> public/<site>
          for d in output/*/; do
            name=$(basename "$d")
            mkdir -p "public/$name"
            cp -r "output/$name/dist/." "public/$name/"
          done
          echo "=== public/ 内容 ==="
          ls -la public

      # 冒烟测试（v0.9.3）：构建产物不是空壳的最后一道闸门（挂载点/JS/title 齐全）。
      # 失败即阻断部署，避免把坏页面推上线。视觉回归（Playwright）留待站点数增多后再上。
      - name: Smoke test built artifacts
        run: node smoke-test.mjs

      - name: Generate sitemap.xml + robots.txt (SEO)
        run: node gen-seo.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # 部署结果通知（非阻断：缺少 secret 或网络失败时不影响部署）
      # 配置方式：仓库 Settings → Secrets → 添加 SLACK_WEBHOOK_URL 或 TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID
      - name: Notify deploy result (Slack / Telegram)
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          MSG="[demo-sites] Deploy ${STATUS} — $(date -u +%FT%TZ) — commit ${GITHUB_SHA::7}"
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sS -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"${MSG}\"}" "$SLACK_WEBHOOK_URL" || true
          fi
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MSG}" || true
          fi
