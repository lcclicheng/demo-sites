name: Deploy demo sites to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 仅用 GITHUB_TOKEN 发布 Pages，不依赖任何明文 PAT
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署，避免并发覆盖
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validate site configs (pre-deploy gate)
        run: node validate-sites.mjs

      - name: Build all 10 demo sites
        run: bash build-clean.sh

      - name: Assemble public/ artifact
        run: |
          rm -rf public
          mkdir -p public
          # 门户页 + 禁用 Jekyll
          cp index.html public/ 2>/dev/null || true
          cp .nojekyll public/ 2>/dev/null || true
          # 每个构建产物 -> public/<site>
          for d in output/*/; do
            name=$(basename "$d")
            mkdir -p "public/$name"
            cp -r "output/$name/dist/." "public/$name/"
          done
          echo "=== public/ 内容 ==="
          ls -la public

      - name: Generate sitemap.xml + robots.txt (SEO)
        run: node gen-seo.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      # 部署结果通知（非阻断：缺少 secret 或网络失败时不影响部署）
      # 配置方式：仓库 Settings → Secrets → 添加 SLACK_WEBHOOK_URL 或 TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID
      - name: Notify deploy result (Slack / Telegram)
        if: always()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          MSG="[demo-sites] Deploy ${STATUS} — $(date -u +%FT%TZ) — commit ${GITHUB_SHA::7}"
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sS -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\"${MSG}\"}" "$SLACK_WEBHOOK_URL" || true
          fi
          if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MSG}" || true
          fi
